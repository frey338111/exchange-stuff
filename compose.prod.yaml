services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
      args:
        INSTALL_DEV_DEPENDENCIES: "${INSTALL_DEV_DEPENDENCIES:-false}"
    image: exchange-stuff-app:latest
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env:ro
      - public:/var/www/html/public
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app

  queue:
    image: exchange-stuff-app:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  scheduler:
    image: exchange-stuff-app:latest
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-exchange_stuff}"
      MYSQL_USER: "${DB_USERNAME:-exchange_stuff}"
      MYSQL_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  bootstrap-cache:
  mysql-data:
  public:
  redis-data:
  storage:
