services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
      args:
        INSTALL_DEV_DEPENDENCIES: "${INSTALL_DEV_DEPENDENCIES:-false}"
    image: exchange-stuff-app:latest
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env:ro
      - public:/var/www/html/public
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - app
      - shared-data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.exchange-stuff.rule=Host(`${APP_HOST:?APP_HOST is required}`)"
      - "traefik.http.routers.exchange-stuff.entrypoints=web"
      - "traefik.http.services.exchange-stuff.loadbalancer.server.port=80"

    volumes:
      - public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app

    networks:
      - app
      - proxy

  queue:
    image: exchange-stuff-app:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - app
      - shared-data

  scheduler:
    image: exchange-stuff-app:latest
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - app
      - shared-data

networks:
  app:
    driver: bridge

  proxy:
    external: true

  shared-data:
    external: true

volumes:
  bootstrap-cache:
  public:
  storage: